apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agrisense-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: agrisense-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agrisense-frontend
                port:
                  number: 3000
