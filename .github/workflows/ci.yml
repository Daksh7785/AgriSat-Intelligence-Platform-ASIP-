name: AgriSense AI CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install system dependencies for GDAL/Rasterio
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin python3-gdal libproj-dev proj-bin

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run Backend Pytest Suite
        run: |
          export SECRET_KEY=testkey
          export POSTGRES_DB=testdb
          export DEMO_MODE=True
          pytest tests/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Docker Image
        run: |
          docker build -t agrisense-backend:latest ./backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t agrisense-frontend:latest ./frontend
