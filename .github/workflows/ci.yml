name: 🌾 Kisan Drishti — CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  SECRET_KEY: testkey_kisan_drishti_ci_minimum_32_chars
  POSTGRES_DB: testdb
  DEMO_MODE: 'True'

jobs:
  # ────────────────────────────────────────────────
  # Job 1: Lint & Static Analysis
  # ────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Check code formatting (black)
        run: black --check backend/app tests/
        continue-on-error: true

      - name: Check import ordering (isort)
        run: isort --check-only backend/app tests/
        continue-on-error: true

      - name: Lint with flake8
        run: |
          flake8 backend/app tests/ \
            --max-line-length=120 \
            --ignore=E501,W503,E402 \
            --exclude=__pycache__,.git,venv
        continue-on-error: true

  # ────────────────────────────────────────────────
  # Job 2: Backend Tests
  # ────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies (GDAL / PROJ)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgdal-dev gdal-bin python3-gdal \
            libproj-dev proj-bin \
            libgeos-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run Pytest with coverage
        env:
          SECRET_KEY: ${{ env.SECRET_KEY }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          DEMO_MODE: ${{ env.DEMO_MODE }}
        run: |
          pytest tests/ \
            --cov=backend/app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v \
            --tb=short

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

  # ────────────────────────────────────────────────
  # Job 3: Frontend Build Check
  # ────────────────────────────────────────────────
  test-frontend:
    name: 🖥️ Frontend Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build Next.js app
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: npm run build

  # ────────────────────────────────────────────────
  # Job 4: Docker Build Validation
  # ────────────────────────────────────────────────
  docker-build:
    name: 🐋 Docker Build Validation
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: kisan-drishti/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: kisan-drishti/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────
  # Job 5: Security Scan
  # ────────────────────────────────────────────────
  security:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit (Python security linter)
        run: pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r backend/app/ \
            -ll \
            --exclude backend/app/tests \
            -f json \
            -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
        continue-on-error: true

  # ────────────────────────────────────────────────
  # Job 6: CI Status Summary
  # ────────────────────────────────────────────────
  ci-success:
    name: ✅ CI Complete
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend, docker-build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "==================================================="
          echo "🌾 Kisan Drishti CI/CD Pipeline — Summary"
          echo "==================================================="
          echo "Lint:           ${{ needs.lint.result }}"
          echo "Backend Tests:  ${{ needs.test-backend.result }}"
          echo "Frontend Build: ${{ needs.test-frontend.result }}"
          echo "Docker Build:   ${{ needs.docker-build.result }}"
          echo "==================================================="
          if [[ "${{ needs.test-backend.result }}" != "success" ]]; then
            echo "❌ Backend tests FAILED — blocking merge"
            exit 1
          fi
          echo "✅ All critical checks passed!"
