version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: agrisense_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agrisense
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agrisense"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agrisense_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrisense_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=agrisense
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=agrisense_super_secret_signing_key_2026
      - DEMO_MODE=True
    volumes:
      - ./backend:/workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrisense_celery_worker
    restart: always
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=agrisense
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=agrisense_super_secret_signing_key_2026
    depends_on:
      - redis
      - db

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrisense_celery_beat
    restart: always
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=agrisense
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=agrisense_super_secret_signing_key_2026
    depends_on:
      - redis
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agrisense_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
